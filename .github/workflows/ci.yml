name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Import boundaries
        run: pnpm lint:deps

      - name: Test
        run: pnpm test

      - name: Benchmark regression check (soft warn)
        run: pnpm bench:solverkit

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox

      - name: Cross-engine drift check (soft warn)
        run: pnpm check:cross-engine-drift

      - name: Engine API docs
        run: pnpm --filter @ballista/engine run docs

      - name: SolverKit API docs
        run: pnpm --filter @ballista/solverkit run docs

      - name: Build app
        run: pnpm --filter @ballista/app build

      - name: Bundle size budget
        run: pnpm --filter @ballista/app check-bundle-size
